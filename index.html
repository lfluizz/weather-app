<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./css/style.css">
    <title>Clima</title>
</head>

<body>
    <div class="container">

        <form id="search">
            <div>
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" 
                name="search-input" 
                id="search-input" 
                placeholder="Buscar cidade"
                autocomplete="off"
                >
            </div>

            <button type="submit" id="search-button">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </form>

        <main class="weather off">
            <h1 id="cityName">Natal, BR</h1>

            <div class="infos">
                <section class="temp-info">
                    <img id="temp-img" src="http://openweathermap.org/img/wn/04d@2x.png" alt="">

                    <div>
                        <p id="temp-value">
                            28 <sup>°C</sup>
                        </p>

                        <p id="temp-description">
                            Nublado
                        </p>
                    </div>
                </section>

                <section class="other-infos">
                    <div class="info">
                        <i id="temp-max-icon" class="fa-solid fa-temperature-high"></i>

                        <div>
                            <h2>Temp. Max</h2>

                            <p id="temp-max">
                                30 <sup>°C</sup>
                            </p>
                        </div>
                    </div>

                    <div class="info">
                        <i id="temp-min-icon" class="fa-solid fa-temperature-low"></i>
                        <div>
                            <h2>Temp. Min</h2>

                            <p id="temp-min">
                                26 <sup>°C</sup>
                            </p>

                        </div>
                    </div>
                    <div class="info">
                        <i id="humidity-icon" class="fa-solid fa-droplet"></i>

                        <div>
                            <h2>Umidade</h2>

                            <p id="humidity">
                                40%
                            </p>
                        </div>

                    </div>
                    <div class="info">
                        <i id="wind-icon" class="fa-solid fa-wind"></i>

                        <div>
                            <h2>Vento</h2>

                            <p id="wind">
                                40 Km/h
                            </p>
                        </div>
                        
                    </div>
                </section>

            </div>
        </main>

        <div id="alert" class="off"> 
            <p id="alert-mensage"> </p>
        </div>

        <p id="loading" class="off">Carregando...</p>
    </div>

    <script src="js/script.js"></script>
    <script src="js/config.js"></script>
</body>
</html>
